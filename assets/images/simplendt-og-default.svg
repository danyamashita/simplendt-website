  <text x="260" y="118" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="10" font-weight="500" fill="#4fd1c5" letter-spacing="2.5">NÍVEL 3 ASNT · PCN / ISO 9712 · RTPO</text>

  <!-- Logo mark -->
  <rect x="80" y="156" width="48" height="48" rx="0" fill="none" stroke="#4fd1c5" stroke-width="1.8"/>
  <text x="104" y="188" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="20" font-weight="700" fill="#4fd1c5">S</text>

  <!-- Logo text -->
  <text x="144" y="190" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="34" font-weight="600" fill="#e2e8f0" letter-spacing="3.5">
    SIMPLE<tspan fill="#4fd1c5">NDT</tspan>
  </text>

