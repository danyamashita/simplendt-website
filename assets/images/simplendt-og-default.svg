  <rect x="990" y="182" width="60" height="30" rx="4" fill="rgba(79,209,197,0.06)" stroke="rgba(79,209,197,0.12)" stroke-width="0.5"/>
  <text x="1020" y="202" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="13" font-weight="500" fill="#94a3b8">PT</text>

