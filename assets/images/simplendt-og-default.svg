  <!-- Geometric accents -->
  <rect x="920" y="-40" width="260" height="260" rx="6" fill="none" stroke="rgba(79,209,197,0.06)" stroke-width="0.5" transform="rotate(45, 1050, 90)"/>
  <rect x="60" y="420" width="160" height="160" rx="4" fill="none" stroke="rgba(79,209,197,0.04)" stroke-width="0.5" transform="rotate(20, 140, 500)"/>

  <!-- Vertical divider line -->
  <line x1="860" y1="80" x2="860" y2="550" stroke="url(#divider)" stroke-width="0.5"/>

  <!-- Badge -->
